name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Format check
        run: uv run --extra dev ruff format --check src tests

      - name: Lint
        run: uv run --extra dev ruff check src tests

      - name: Type check
        run: uv run --extra dev mypy

      - name: Test
        run: uv run --extra dev pytest

      - name: Build package
        run: uv build

      - name: Build runtime image
        run: docker build --pull --target runtime -t template-project:ci .

      - name: Container smoke test
        run: docker run --rm template-project:ci
