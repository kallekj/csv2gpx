name: CI

on:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Format check
        run: uv run ruff format --check src tests

      - name: Lint
        run: uv run ruff check src tests

      - name: Type check
        run: uv run mypy

      - name: Test
        run: uv run pytest

      - name: Build package
        run: uv build

      - name: Build runtime image
        run: docker build --pull --target runtime -t voxcpm-wyomming:ci .

      - name: Container smoke test
        run: docker run --rm voxcpm-wyomming:ci
