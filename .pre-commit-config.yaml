repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.0
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        additional_dependencies: []

  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest-fast
        entry: uv run --extra dev pytest -q
        language: system
        pass_filenames: false
