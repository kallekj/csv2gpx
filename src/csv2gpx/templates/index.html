<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CSV to GPX Alignment</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <div class="panel upload-panel">
          <div class="brand">
            <span class="brand-mark">GPX</span>
            <div>
              <h1>CSV to GPX Alignment</h1>
              <p>NMEA2000 log trimming for GoPro footage</p>
            </div>
          </div>

          <form id="upload-form" class="upload-form">
            <label>
              <span>CSV log</span>
              <input id="log-file" name="log_file" type="file" accept=".csv,.dat" required />
            </label>
            <label>
              <span>Video</span>
              <input id="video-file" name="video_file" type="file" accept="video/*" required />
            </label>
            <button type="submit">Analyze</button>
          </form>

          <div id="message" class="message" role="status"></div>
        </div>

        <div class="panel video-panel">
          <video id="video" controls playsinline></video>
        </div>

        <div class="panel stats-panel">
          <div>
            <span class="label">Log</span>
            <strong id="log-range">-</strong>
          </div>
          <div>
            <span class="label">Video</span>
            <strong id="video-range">-</strong>
          </div>
          <div>
            <span class="label">Overlap</span>
            <strong id="overlap">-</strong>
          </div>
        </div>

        <div class="panel controls-panel">
          <label>
            <span>Offset seconds</span>
            <input id="offset" type="number" step="0.1" value="0" disabled />
          </label>
          <label>
            <span>Export start</span>
            <input id="trim-start" type="datetime-local" step="1" disabled />
          </label>
          <label>
            <span>Export end</span>
            <input id="trim-end" type="datetime-local" step="1" disabled />
          </label>
          <form id="export-form">
            <button id="export-button" type="submit" disabled>Export GPX</button>
          </form>
        </div>

        <div class="panel map-panel">
          <canvas id="track-canvas" width="900" height="520"></canvas>
        </div>
      </section>
    </main>

    <script src="{{ url_for('static', path='/app.js') }}"></script>
  </body>
</html>
